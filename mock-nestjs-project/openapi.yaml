openapi: 3.0.3
info:
  title: Mock NestJS API
  version: 1.0.0
paths:
  /auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Success
  /auth/refresh:
    post:
      summary: Refresh
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success
  /users/me:
    get:
      summary: Profile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success
  /items:
    get:
      summary: List
      responses:
        '200':
          description: Success
    post:
      summary: Create
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Created
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
